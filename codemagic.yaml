workflows:
  ios-release:
    name: IronMetal iOS Production
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        EXPO_APPLE_TEAM_ID: "9MLYHHLY82"
        EXPO_ASC_API_KEY_ID: "XLB4TLKY66"
        EXPO_ASC_API_KEY_ISSUER_ID: "990d71a4-1bd0-4ca7-a3f9-417d062f6ac1"
        EXPO_NO_APPLE_ID_AUTH: "1"
        EAS_NO_VCS: "1"
      groups:
        - expo
        - apple
    scripts:
      - name: Install Dependencies
        script: |
          npm install
          npm install -g eas-cli
      - name: Build and Submit to App Store
        script: |
          # إنشاء ملف المفتاح ومعالجة الأسطر الجديدة بدقة
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          chmod 600 ./AuthKey_XLB4TLKY66.p8
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"
          
          # تنفيذ البناء والرفع
          eas build --platform ios --profile production --non-interactive --auto-submit
    artifacts:
      - build/ios/ipa/*.ipa

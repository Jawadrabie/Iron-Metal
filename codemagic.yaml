workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # إنشاء ملف المفتاح في مكان ثابت
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          
          # إعداد متغيرات البيئة التي يتوقعها EAS
          export EXPO_APPLE_APP_SPECIFIC_PASSWORD="" # اتركه فارغاً لأننا نستخدم API Key
          export EAS_NO_VCS=1
          
          # إخبار EAS بمكان المفتاح والمعلومات عبر متغيرات البيئة
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"
          export EXPO_ASC_API_KEY_ID="$APP_STORE_CONNECT_KEY_ID"
          export EXPO_ASC_API_KEY_ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"
          
          # تشغيل البناء بأمر بسيط
          eas build --platform ios --profile production --local --non-interactive
    artifacts:
      - build/*.ipa

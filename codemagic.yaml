workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # 1. إنشاء ملف المفتاح p8
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8

          # 2. إنشاء ملف الاعتمادات المحلي بتنسيق JSON دقيق جداً
          # لاحظ إضافة appleTeamId هنا، بدونه يرفض EAS الملف
          cat > credentials.json <<EOF
          {
            "ios": {
              "appleTeamId": "9MLYHHLY82",
              "ascApiKeyId": "XLB4TLKY66",
              "ascApiKeyIssuerId": "990d71a4-1bd0-4ca7-a3f9-417d062f6ac1",
              "ascApiKeyPath": "./AuthKey_XLB4TLKY66.p8"
            }
          }
          EOF

          # 3. متغيرات البيئة للسلامة
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true

          # 4. أمر البناء (الآن سيجد ملف credentials.json كاملاً ولن يذهب للسيرفر)
          eas build --platform ios --profile production --local --non-interactive
    artifacts:
      - build/*.ipa

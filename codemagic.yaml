scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # 1. إنشاء ملف المفتاح
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          
          # 2. إعداد المتغيرات اللازمة
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true
          
          # 3. أمر البناء باستخدام الـ Flags المباشرة (هذه الطريقة تجبره على المسار المحلي)
          # لاحظ استخدام --apple-id و الأعلام الجديدة للـ API Key
          eas build --platform ios --profile production --local --non-interactive \
            --apple-id "alabuo@gmail.com" \
            --id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --p8-path "./AuthKey_XLB4TLKY66.p8"

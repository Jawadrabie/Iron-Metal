workflows:
  ios-expo-workflow:
    name: Expo iOS Production Build
    instance_type: mac_mini_m1

    environment:
      node: 18
      groups:
        - expo
        - apple

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo & EAS
        script: |
          npm install -g expo-cli
          npm install -g eas-cli

      - name: Prepare Apple API key
        script: |
          echo "$APP_STORE_CONNECT_P8" > AuthKey.p8

      - name: Export Apple credentials
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          export EXPO_ASC_API_KEY_PATH=AuthKey.p8
          export EXPO_ASC_API_KEY_ID=$APP_STORE_CONNECT_KEY_ID
          export EXPO_ASC_API_KEY_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID
          export EXPO_APPLE_TEAM_ID=9MLYHHLY82
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true
          export EAS_BUILD_AUTOCREATE_CREDENTIALS=1

      - name: Build iOS
        script: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --clear-credentials \
            --no-wait

workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # إنشاء ملف المفتاح من المتغير الذي أضفته
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          
          # تنفيذ البناء
          eas build --platform ios --profile production --local --non-interactive \
            --p8-path ./AuthKey_XLB4TLKY66.p8 \
            --id $APP_STORE_CONNECT_KEY_ID \
            --issuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/*.ipa

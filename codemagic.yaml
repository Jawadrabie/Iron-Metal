workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo   # تأكد أن هذا الجروب يحتوي على EXPO_TOKEN
        - apple  # تأكد أن هذا الجروب يحتوي على APP_STORE_CONNECT_P8 والـ IDs
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # 1. إعداد المتغيرات الأساسية للهوية
          export EXPO_APPLE_ID="alabuo@gmail.com"
          export EXPO_ASC_API_KEY_ID="XLB4TLKY66"
          export EXPO_ASC_API_KEY_ISSUER_ID="990d71a4-1bd0-4ca7-a3f9-417d062f6ac1"
          
          # 2. إنشاء ملف المفتاح الفعلي p8
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"
          
          # 3. تعطيل تحذيرات النظام وتفعيل الوضع غير التفاعلي
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true

          # 4. خطوة التهيئة: نطلب من EAS إنشاء ملف الاعتمادات الصحيح آلياً
          # هذا السطر سيقوم بالتواصل مع آبل وجلب الشهادات وتخزينها محلياً للبناء
          eas credentials --platform ios --profile production --non-interactive || true
          
          # 5. أمر البناء النهائي
          # سيستخدم الآن الشهادات التي تم تجهيزها في الخطوة السابقة
          eas build --platform ios --profile production --local --non-interactive --credentials-source local
    artifacts:
      - build/*.ipa

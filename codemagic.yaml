workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      vars:
        EXPO_APPLE_ID: "alabuo@gmail.com"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli eas-cli
      - name: Build iOS IPA
        script: |
          # هذا الأمر يبني التطبيق محلياً على سيرفر Codemagic
          npx eas build --platform ios --profile production --local --non-interactive
    artifacts:
      - build/*.ipa
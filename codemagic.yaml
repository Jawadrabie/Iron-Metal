# اسم المشروع: Iron-Metal
workflows:
  ios-release:
    name: IronMetal iOS Production
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        # إعدادات لضمان عدم التوقف لطلب أي مدخلات يدوية أو SMS
        EXPO_APPLE_TEAM_ID: "9MLYHHLY82"
        EXPO_ASC_API_KEY_ID: "XLB4TLKY66"
        EXPO_ASC_API_KEY_ISSUER_ID: "990d71a4-1bd0-4ca7-a3f9-417d062f6ac1"
        EXPO_NO_APPLE_ID_AUTH: "1"
        EAS_NO_VCS: "1"
        EAS_BUILD_NO_EXPO_GO_WARNING: "true"
      groups:
        - expo # تأكد أن EXPO_TOKEN و APP_STORE_CONNECT_P8 مضافين في هذه المجموعة في Codemagic
    scripts:
      - name: Install Dependencies
        script: |
          npm install
          npm install -g eas-cli
      - name: Build and Submit to App Store
        script: |
          # 1. استخراج ملف المفتاح (.p8) من المتغيرات البيئية
          # سيتم إنشاء الملف في مجلد المشروع لكي يراه EAS CLI
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          
          # 2. تحديد مسار المفتاح للمتغير الخاص بـ EAS
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"

          # 3. تشغيل عملية البناء والرفع التلقائي
          # الأمر --auto-submit هو الحل الجذري الذي يربط البناء بالرفع مباشرة
          # وسيستخدم الإعدادات الموجودة في ملف eas.json الخاص بك
          eas build --platform ios --profile production --non-interactive --auto-submit
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - alabuo@gmail.com # سيصلك إيميل عند انتهاء العملية بنجاح# اسم المشروع: Iron-Metal

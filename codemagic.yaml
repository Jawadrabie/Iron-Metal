workflows:
  ios-expo-workflow:
    name: Expo iOS Production Build
    instance_type: mac_mini_m1

    environment:
      node: 18
      groups:
        - expo
        - apple

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo & EAS CLI
        script: |
          npm install -g expo-cli
          npm install -g eas-cli

      - name: Prepare Apple API key
        script: |
          echo "$APP_STORE_CONNECT_P8" > AuthKey.p8

      - name: Export Apple & Expo environment v

workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # 1. إنشاء ملف المفتاح
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8

          # 2. تصدير المتغيرات بالأسماء "المقدسة" لدى Expo (سيتعرف عليها تلقائياً)
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"
          export EXPO_ASC_API_KEY_ID="XLB4TLKY66"
          export EXPO_ASC_API_KEY_ISSUER_ID="990d71a4-1bd0-4ca7-a3f9-417d062f6ac1"
          
          # 3. إعدادات البيئة
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true

          # 4. أمر البناء "النقي" (بدون أي Flags زائدة تسبب أخطاء)
          # بما أننا لم نحدد credentialsSource في eas.json، سيبحث EAS في المتغيرات أعلاه فوراً
          eas build --platform ios --profile production --local --non-interactive
    artifacts:
      - build/*.ipa

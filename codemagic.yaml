workflows:
  ios-expo-workflow:
    name: iOS Expo Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build iOS IPA
        script: |
          # 1. إنشاء ملف المفتاح من المتغيرات
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_XLB4TLKY66.p8
          
          # 2. تعريف متغيرات البيئة لـ EAS
          export EAS_NO_VCS=1
          export EXPO_ASC_API_KEY_PATH="./AuthKey_XLB4TLKY66.p8"
          export EXPO_ASC_API_KEY_ID="$APP_STORE_CONNECT_KEY_ID"
          export EXPO_ASC_API_KEY_ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"
          
          # 3. أمر البناء مع إجبار استخدام الشهادات المحلية (local)
          # هذا السطر يمنع EAS من البحث في الشهادات القديمة على سيرفرات Expo
          eas build --platform ios --profile production --local --non-interactive --credentials-source local
    artifacts:
      - build/*.ipa

workflows:
  ios-expo-workflow:
    name: IronMetal Final Deploy
    instance_type: mac_mini_m1
    environment:
      groups:
        - expo
        - apple
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Production Build & Upload
        script: |
          # 1. إنشاء ملف المفتاح الجديد (p8) الخاص بعبد الكافي
          echo "$APP_STORE_CONNECT_P8" > ./AuthKey_NEW.p8

          # 2. إعداد متغيرات البيئة (استخدم القيم التي أعطاك إياها بدقة)
          export EXPO_ASC_API_KEY_PATH="./AuthKey_NEW.p8"
          export EXPO_ASC_API_KEY_ID="KEY_ID_الجديد"
          export EXPO_ASC_API_KEY_ISSUER_ID="ISSUER_ID_الجديد"
          export EXPO_APPLE_TEAM_ID="9MLYHHL Y82"
          
          export EAS_NO_VCS=1
          export EAS_BUILD_NO_EXPO_GO_WARNING=true

          # 3. محاولة مسح أي سجلات شهادات قديمة عالقة في إكسبو
          eas credentials --platform ios --profile production --non-interactive || true

          # 4. البناء السحابي مع تجاهل الأخطاء السابقة
          # سيقوم EAS الآن بإنشاء شهادة جديدة لأن المفتاح يخص صاحب الحساب
          eas build --platform ios --profile production --non-interactive --no-wait
